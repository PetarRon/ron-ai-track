      <header>
        <h1>Petaron.ai - AI Order Processing for Freight Forwarders</h1>
        <p><strong>Order entry has never been this easy.</strong> The moment an order arrives, our AI agent gets to work.</p>
        <p>No more manual entry. Petaron.ai works side-by-side with your team, handling order intake, allowing your team to build stronger customer relationships.</p>
        <p><a href="https://cal.com/ron-lev-tabuchov-tgk0nx/30min">Book a free 30-minute demo</a> &middot; <a href="/?contact=1">Get in touch</a></p>
      </header>

      <section>
        <h2>How it works</h2>
        <ol>
          <li>
            <h3>Capture</h3>
            <p>Reads emails, PDFs, and attachments across all channels into one clean intake stream.</p>
          </li>
          <li>
            <h3>Process</h3>
            <p>Structures order data, maps fields, and validates critical details automatically.</p>
          </li>
          <li>
            <h3>Review</h3>
            <p>Operators approve ready drafts in seconds and push directly to your TMS.</p>
          </li>
        </ol>
      </section>

      <section>
        <h2>What manual order entry costs you today</h2>
        <p>Use the cost calculator on the live site to estimate what your team is spending on manual entry: orders per day &times; minutes per order &times; hourly staff cost. Most teams cut this 80%+ with Petaron.ai.</p>
      </section>

      <section>
        <h2>Frequently asked questions</h2>

        <h3>Does it work with our existing TMS?</h3>
        <p>Yes. Petaron.ai connects to the TMS you already use. No ripping and replacing, your setup stays the same, the manual work disappears.</p>

        <h3>How long does it take to get started?</h3>
        <p>Days, not months. We connect to your email flow, configure your fields, and you are processing orders within a week.</p>

        <h3>Does our team lose control over orders?</h3>
        <p>Never. AI handles the intake, your team makes every decision. Nothing moves to your TMS without human approval.</p>

        <h3>Is this built specifically for logistics?</h3>
        <p>From the ground up. Petaron.ai was designed around the daily reality of freight operations, multi-format orders, tight deadlines, and zero tolerance for errors.</p>

        <h3>What happens when the AI encounters an edge case?</h3>
        <p>It flags it. Anything the AI is not fully confident about gets routed to your team for review. Nothing slips through unchecked.</p>

        <h3>How fast is the ROI?</h3>
        <p>Most teams see the impact in the first week. Less time on data entry means more time with customers, that is value from day one.</p>

        <h3>Is there a free trial or pilot?</h3>
        <p>We offer a free 14-day pilot with your actual data. You will see exactly how it performs before making any commitment.</p>
      </section>
